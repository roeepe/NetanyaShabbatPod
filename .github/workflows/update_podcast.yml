name: Update Podcast RSS Feed

on:
  schedule:
    # Run daily at 21:00 UTC (00:00 Israel Summer Time)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-feed:
    runs-on: ubuntu-latest
    
    # We need contents: write permission to commit back to the repo and create releases
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # yt-dlp requires ffmpeg for audio extraction
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install --upgrade -r requirements.txt

      - name: Run podcast updater script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python podcast_updater.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "Automated podcast feed update" && git push)
